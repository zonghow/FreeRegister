# 运行控制。
# run_until_empty = true 时会忽略 total，按 concurrency 一直运行到 email.txt 无可用邮箱。
[run]
total = 1
concurrency = 1
# fixed 保持固定 worker 数；adaptive 会以 concurrency 为初始目标并自动扩缩容。
concurrency_mode = "fixed"
use_browser_sentinel = false
run_until_empty = false
# adaptive 模式下尽量贴近 HeroSMS 总 RPS 上限的目标利用率；0.9 表示 90%。
adaptive_target_sms_rps_utilization = 0.9
adaptive_control_interval_ms = 5000
# 0 表示按当前 Node heap 自动计算；达到软阈值会停止派发新任务，达到硬阈值会强制暂停。
memory_soft_limit_mb = 0
memory_hard_limit_mb = 0

# OpenAI / Codex 登录配置。
# CPA JSON 现在固定保存在 [cpa_json].dir；save_auth_json 只控制额外 auth/ 目录保存。
[openai]
default_password = "change-this-password"
save_auth_json = false

# HeroSMS 接码配置。
# countries 按顺序尝试；网页国家选项会优先从 HeroSMS getCountries 接口获取并永久缓存。
# acquire_priority 可选 country / price_low / price_high。
# api_keys 非空时优先于旧字段 api_key；api_key_strategy 可选 round_robin / fill_first，也可在后台接码配置中切换。
# rps_limit 是账号级限制；同一个 key 的所有 HeroSMS API 请求共享，默认每个 key 40 RPS。
# proxy_strategy 可选：
#   "hero_sms" 使用 proxy_urls 专用代理池
#   "proxies" 复用 [proxies].urls 代理池
#   "direct" 不走代理
[hero_sms]
api_keys = []
api_key_strategy = "round_robin"
rps_limit = 40
# 兼容旧单 key 配置；配置 api_keys 后会忽略 api_key。
api_key = ""
proxy_strategy = "direct"
proxy_urls = []
countries = [33]
acquire_priority = "country"
min_price = 0.45
max_price = 0.5
price_step = 0.01
# 最多轮询次数由程序按 poll_interval_ms 自动计算到超过 2 分钟，不支持配置。
poll_interval_ms = 3000
max_phone_tries = 20
auto_release_on_timeout = true

# 邮箱池文件。
# 并发读写会通过 lock 文件串行化；不要手动删除 inflight，除非确认任务已停止。
[email_pool]
source = "email.txt"
success = "email.success.txt"
inflight = "email.inflight.txt"
failed = "email.failed.txt"
lock = ".email.lock"

# OAuth 成功后保存的 CPA JSON 目录。
# Docker 中相对路径会落到 /data/cpa_json，也就是项目根目录的 cpa_json/。
[cpa_json]
dir = "cpa_json"

# 成功账号成本统计。每个成功账号会追加一行 JSONL 流水。
[cost]
email_unit_cost = 0.05
currency = "USD"
success_ledger = "cost.success.jsonl"
lock = ".cost.lock"

# 代理池。多个代理会按 worker 轮询负载均衡。
[proxies]
urls = []

# 只有 use_browser_sentinel = true 时才需要浏览器。
[sentinel_browser]
path = "/usr/bin/chromium"

# Sentinel SDK 更新源和本地文件。
# npm run update:sdk 会更新 file 指向的 sdk.js。
[sentinel_sdk]
url = "https://sentinel.openai.com/sentinel/20260219f9f6/sdk.js"
file = "sdk.js"
