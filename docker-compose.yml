services:
  free-register:
    restart: unless-stopped
    build:
      context: .
      target: ${FREE_REGISTER_DOCKER_TARGET:-runtime}
    image: free-register:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FREE_REGISTER_ADMIN_PASSWORD: "${FREE_REGISTER_ADMIN_PASSWORD:-changeme}"
      FREE_REGISTER_ADMIN_PORT: "8788"
      FREE_REGISTER_CONFIG: /data/config.toml
      FREE_REGISTER_EMAIL_POOL_DIR: /data
      FREE_REGISTER_SENTINEL_SDK_FILE: /data/sdk.js
      NODE_OPTIONS: "--max-old-space-size=${FREE_REGISTER_NODE_HEAP_MB:-12288}"
    ports:
      - "${FREE_REGISTER_ADMIN_PORT:-8788}:8788"
    volumes:
      - ./:/data
